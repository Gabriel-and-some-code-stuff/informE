name: AI PR Review

# GitHub Models — custo $0, usa o GITHUB_TOKEN que já existe em todo workflow.
# Docs: https://docs.github.com/en/github-models

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff (.cs/.razor/.csproj, máx 8 KB)
        id: diff
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD \
            -- '*.cs' '*.csproj' '*.razor' | head -c 8000)
          {
            echo 'diff<<EOF'
            echo "$DIFF"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: GitHub Models review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIFF: ${{ steps.diff.outputs.diff }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          BODY=$(curl -sf https://models.inference.ai.azure.com/chat/completions \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg diff "$DIFF" '{
              model: "gpt-4o-mini",
              max_tokens: 1024,
              messages: [{
                role: "user",
                content: ("Você é revisor de código C#/.NET 10. Revise o diff abaixo de um projeto RMM (Arquitetura Onion).\n\nRegras do projeto:\n- Domain NUNCA referencia Infrastructure ou Application\n- Senhas: só Argon2id via IPasswordHasher\n- IDs: sempre Guid, nunca int auto-increment\n- Datas: sempre UTC (DateTimeOffset)\n- JWT: só via IJwtTokenService\n- Telemetria ao vivo NÃO é persistida (flui só pelo hub)\n\nAponte no máximo 5 problemas reais (bugs, violações de Onion, falhas de segurança). Ignore style. Se estiver ok, diga. Seja direto e em português.\n\nDiff:\n" + $diff)
              }]
            }')" | jq -r '.choices[0].message.content')

          gh pr comment "$PR_NUM" --body "## Revisão automática (GitHub Models)

$BODY

---
*\`${{ github.sha }}\` · [run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"
