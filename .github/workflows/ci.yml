name: CI

on:
  push:
  pull_request:

jobs:
  # Agent não precisa de MAUI — roda no ubuntu, mais rápido e gratuito.
  build-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build informE.Agent.slnx -c Release --nologo

  # Host precisa de MAUI (Windows-only). Workload cacheado pra não reinstalar toda vez.
  build-host:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Cache MAUI workload
        id: maui-cache
        uses: actions/cache@v6
        with:
          path: C:\Users\runneradmin\AppData\Local\Microsoft\dotnet\
          key: maui-workload-net10-${{ runner.os }}

      - name: Restore workloads (MAUI)
        if: steps.maui-cache.outputs.cache-hit != 'true'
        run: dotnet workload restore informE.Host.slnx

      - name: Build Host
        run: dotnet build informE.Host.slnx -c Release --nologo

      - name: Test
        run: dotnet test informE.Host.slnx -c Release --nologo
