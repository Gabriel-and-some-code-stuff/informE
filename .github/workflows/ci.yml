name: CI

on:
  push:
  pull_request:

jobs:
  build:
    # windows-latest porque o Desktop (MAUI) só builda em Windows.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Instala o workload maui-windows exigido pelo informE.Desktop.
      # (é a parte lenta do CI; se quiser acelerar, mova o Desktop pra um job separado)
      - name: Restore workloads (MAUI)
        run: dotnet workload restore informE.Host.slnx

      - name: Build Host
        run: dotnet build informE.Host.slnx -c Release --nologo

      - name: Build Agent
        run: dotnet build informE.Agent.slnx -c Release --nologo

      - name: Test
        run: dotnet test informE.Host.slnx -c Release --nologo
